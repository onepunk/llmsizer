name: Update Model Database

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Pre-scrape diagnostics
        # Surfaces any surprises (missing file, LFS pointer, permissions)
        # BEFORE the scraper runs, so if models.json is wrong we know
        # immediately rather than crashing ten minutes later.
        run: |
          echo "== workspace =="
          pwd
          echo "== public/models.json =="
          ls -la public/models.json || echo "MISSING"
          wc -c public/models.json || true
          head -c 200 public/models.json || true
          echo
          echo "== is it valid JSON? =="
          python3 -c "import json; d=json.load(open('public/models.json')); print('OK', len(d), 'models')"
      - name: Scrape models from HuggingFace
        # The scraper writes JSON to data/hf_models.json (upstream convention),
        # not stdout — stdout carries progress logs. Copy it into the location
        # the web app actually reads from.
        run: |
          python3 scripts/scrape_hf_models.py --discover -n 800
          echo "== data/hf_models.json =="
          ls -la data/hf_models.json
          wc -c data/hf_models.json
          cp data/hf_models.json public/models.json.tmp
      - name: Check for changes
        id: diff
        run: |
          OLD_COUNT=$(python3 -c "import json; print(len(json.load(open('public/models.json'))))")
          NEW_COUNT=$(python3 -c "import json; print(len(json.load(open('public/models.json.tmp'))))")
          if [ "$NEW_COUNT" -lt $(( OLD_COUNT / 2 )) ]; then
            echo "::error::Model count dropped from $OLD_COUNT to $NEW_COUNT (>50% drop). Aborting."
            rm public/models.json.tmp
            exit 1
          fi
          if ! diff -q public/models.json public/models.json.tmp > /dev/null 2>&1; then
            mv public/models.json.tmp public/models.json
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            rm public/models.json.tmp
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit updated models
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/models.json
          git commit -m "chore: update model database from HuggingFace"
          git push
