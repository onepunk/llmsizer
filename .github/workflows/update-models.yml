name: Update Model Database

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Scrape models from HuggingFace
        run: npx tsx scripts/scrape-models.ts > public/models.json.tmp
      - name: Check for changes
        id: diff
        run: |
          OLD_COUNT=$(python3 -c "import json; print(len(json.load(open('public/models.json'))))")
          NEW_COUNT=$(python3 -c "import json; print(len(json.load(open('public/models.json.tmp'))))")
          if [ "$NEW_COUNT" -lt $(( OLD_COUNT / 2 )) ]; then
            echo "::error::Model count dropped from $OLD_COUNT to $NEW_COUNT (>50% drop). Aborting."
            rm public/models.json.tmp
            exit 1
          fi
          if ! diff -q public/models.json public/models.json.tmp > /dev/null 2>&1; then
            mv public/models.json.tmp public/models.json
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            rm public/models.json.tmp
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit updated models
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/models.json
          git commit -m "chore: update model database from HuggingFace"
          git push
