services:
  nginx:
    container_name: dev-llmsizer-nginx
    build: .
    ports:
      - "127.0.0.1:10800:80"
    networks:
      - default
      - shared-edge
    read_only: true
    tmpfs:
      - /var/cache/nginx:mode=1777
      - /var/run:mode=1777
      - /tmp:mode=1777
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    restart: unless-stopped

networks:
  default:
    name: dev-llmsizer
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.9.0/24
  shared-edge:
    external: true
